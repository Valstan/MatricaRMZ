# MatricaRMZ backend reverse-proxy
#
# Catch-all design: всё что не имеет специального блока — идёт на backend
# с дефолтными таймаутами. Новые эндпойнты в backend работают БЕЗ правки nginx.
#
# Специальные блоки нужны только там, где требуются нестандартные таймауты,
# размер тела запроса или размер буферов.
#
# Источник истины: deploy/nginx/matricarmz-backend.conf в репо MatricaRMZ.
# Выкат на прод: deploy/nginx/install.sh (или вручную, см. deploy/nginx/README.md).

upstream matricarmz_backend {
    least_conn;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3002 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen 443 ssl default_server;
    # Плейнтекст-порт — только для локальных проб (health-чеки скриптов); наружу
    # не светим (до 2026-07-04 слушал 0.0.0.0 — security-аудит, Фаза 2 mediums).
    listen 127.0.0.1:18080 default_server;

    server_name _;

    ssl_certificate     /etc/letsencrypt/live/a6fd55b8e0ae.vps.myjino.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/a6fd55b8e0ae.vps.myjino.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HTTP -> HTTPS (за port-forwarder'ом провайдера: X-Forwarded-Proto учитывается).
    set $redirect_http 0;
    if ($server_port = 80) { set $redirect_http 1; }
    if ($http_x_forwarded_proto = https) { set $redirect_http 0; }
    if ($redirect_http = 1) { return 302 https://$host$request_uri; }

    access_log /var/log/nginx/matricarmz_access.log main;
    error_log  /var/log/nginx/matricarmz_error.log info;

    # Общие proxy-настройки — наследуются всеми location, если не переопределены.
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_buffer_size       16k;
    proxy_buffers           8 32k;
    proxy_busy_buffers_size 64k;

    proxy_next_upstream error timeout invalid_header http_502 http_503;
    proxy_next_upstream_tries   2;
    proxy_next_upstream_timeout 10s;

    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;
    client_max_body_size  2m;

    # === Спец-блоки только для нестандартных параметров ===

    # Sync: длинные long-poll, крупный body, большие буферы.
    location ^~ /sync/ {
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
        client_max_body_size    20m;
        proxy_buffers           32 128k;
        proxy_busy_buffers_size 256k;
        proxy_pass http://matricarmz_backend;
    }

    # Files: загрузка крупных файлов.
    location ^~ /files/ {
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
        client_max_body_size 30m;
        proxy_pass http://matricarmz_backend;
    }

    # AI: SSE/streaming, длинные ответы LLM.
    location ^~ /ai/ {
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering    off;
        proxy_pass http://matricarmz_backend;
    }

    # Ledger: крупные блоки, увеличенные буферы.
    location ^~ /ledger/ {
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
        proxy_buffers           32 128k;
        proxy_busy_buffers_size 256k;
        proxy_pass http://matricarmz_backend;
    }

    # Updates: скачивание .exe (десятки мегабайт).
    location ^~ /updates/ {
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass http://matricarmz_backend;
    }

    # Backups: pg_dump streaming.
    location ^~ /backups/ {
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass http://matricarmz_backend;
    }

    # Reports / work-orders: умеренно долгие отчёты.
    location ^~ /reports/ {
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://matricarmz_backend;
    }
    location ^~ /work-orders/ {
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://matricarmz_backend;
    }

    # Auth: чуть больший body (загрузка аватаров и т.п.).
    location ^~ /auth/ {
        client_max_body_size 2m;
        proxy_pass http://matricarmz_backend;
    }

    # Legacy API aliases: /api/erp/..., /api/v1/erp/..., /api/warehouse/..., /api/v1/warehouse/...
    # переписываем в /erp/... и /warehouse/...
    location ~ ^/api(?:/v1)?/(erp|warehouse)(/.*)?$ {
        # External API alias reverse-proxy (not an X-Accel internal redirect); 'internal' would break the API.
        proxy_pass http://matricarmz_backend/$1$2$is_args$args; # nosemgrep
    }

    # Эндпойнты, на которых Express router сконфигурирован со strict slash:
    # без trailing slash отдаёт 301, что для POST превращает запрос в GET и
    # клиент теряет тело. Принудительно добавляем slash на уровне nginx
    # (через path в proxy_pass — rewrite не работает с regex-location без path).
    location = /work-orders { proxy_pass http://matricarmz_backend/work-orders/; }
    location = /backups     { proxy_pass http://matricarmz_backend/backups/; }
    location = /updates     { proxy_pass http://matricarmz_backend/updates/; }

    # === Catch-all ===
    # Всё остальное (health, chat, presence, admin, admin-ui, client, diagnostics,
    # logs, changes, parts, erp, warehouse, workshops, warehouse-locations и любые
    # будущие эндпойнты backend'а) идёт напрямую на backend с дефолтами.
    location / {
        proxy_pass http://matricarmz_backend;
    }
}
